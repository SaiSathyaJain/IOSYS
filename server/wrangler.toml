name = "iosys"
main = "src/worker.js"
compatibility_date = "2024-02-03"
account_id = "19c0d96e299540169a2b0b628c5084b0"

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "inward-outward-db"
database_id = "21c7aa21-b60a-49d6-a7dd-e6af1f670cbf"

[triggers]
crons = [
  "30 5 * * 6",   # Weekly report — every Saturday at 11:00 AM IST (05:30 UTC)
  "*/30 * * * *", # Inbox poller — every 30 minutes
  "0 11 * * 6"    # DB backup to Google Sheets — every Saturday at 4:30 PM IST (11:00 UTC)
]
